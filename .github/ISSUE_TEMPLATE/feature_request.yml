name: Feature request
description: Suggest a new check, template, connector, or report improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What maintenance or production-readiness gap should this solve?
      placeholder: "It is hard to tell whether..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should the tool do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Production audit
        - Reports
        - GitHub Actions
        - Database
        - Observability
        - Security scanner
        - Documentation
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Example evidence
      description: Paste sanitized examples, links, or output that would help design the feature.
