name: Quickstart feedback
description: Share first-run quickstart results from a public or redacted project.
title: "[Quickstart]: "
labels:
  - feedback
body:
  - type: markdown
    attributes:
      value: |
        Thanks for trying quickstart. Please redact secrets, tokens, private repository names, local filesystem paths, customer data, and production logs.
  - type: input
    id: version
    attributes:
      label: Version
      description: Paste the npm version you used.
      placeholder: "1.5.1"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact command.
      render: powershell
      placeholder: "npx ai-project-maintainer quickstart ."
    validations:
      required: true
  - type: input
    id: project_type
    attributes:
      label: Project type
      description: Describe the project without exposing private details.
      placeholder: "Next.js app, Node API, OSS npm library, Electron app"
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Quickstart status
      options:
        - PASS
        - PASS_WITH_WARNINGS
        - PASS_WITH_GAPS
        - FAIL
        - Command/runtime failure
    validations:
      required: true
  - type: dropdown
    id: time_to_report
    attributes:
      label: Time to first useful report
      description: Count from reading the command to opening quickstart-summary.md.
      options:
        - Under 1 minute
        - 1-3 minutes
        - 3-10 minutes
        - More than 10 minutes
        - I did not get a report
    validations:
      required: true
  - type: textarea
    id: expectation
    attributes:
      label: What did you expect before running it?
      description: In your own words, what did you think quickstart would do?
    validations:
      required: true
  - type: dropdown
    id: interpretation
    attributes:
      label: Were the result categories clear?
      options:
        - Yes, I understood what was actually found
        - Partly, I still had to read the docs
        - No, I read every blocker as a confirmed vulnerability
        - No, I read an evidence or tooling gap as a vulnerability
        - No, another part was unclear
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Paste blocker, warning, and gap counts plus the top items from quickstart-summary.md after redacting sensitive data.
      placeholder: |
        Status: PASS_WITH_GAPS
        Blockers: 0
        Warnings: 3
        Evidence gaps: 5
        Top items: ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected or confusing behavior
      description: What felt wrong, confusing, too strict, or missing?
    validations:
      required: true
  - type: textarea
    id: next_action
    attributes:
      label: What did you think you should do next?
      description: State the next action you inferred from the report, even if you were unsure.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, package manager, and relevant scanner/network notes.
      placeholder: "Windows 11, Node 24, npm 11, corporate proxy, Trivy cache present"
