name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  security:
    name: Heavy security gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Go for scanner CLIs
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install project dependencies
        run: npm ci

      - name: Install scanner CLIs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          python -m pip install --user semgrep zizmor checkov
          go install github.com/gitleaks/gitleaks/v8@latest
          go install github.com/google/osv-scanner/cmd/osv-scanner@latest
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          go install github.com/ossf/scorecard/v5@latest
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b "$HOME/.local/bin"

      - name: Run tests
        run: npm test

      - name: Check script syntax
        run: npm run check

      - name: Validate package contents
        run: npm pack --dry-run

      - name: Prepare report directory
        run: mkdir -p reports

      - name: Capture Gitleaks evidence
        continue-on-error: true
        run: gitleaks detect --source . --redact --no-git --report-format json --report-path reports/gitleaks.json

      - name: Capture Trivy evidence
        continue-on-error: true
        run: trivy fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL --format json --output reports/trivy.json .

      - name: Capture Semgrep evidence
        continue-on-error: true
        run: semgrep scan --config auto --sarif --output reports/semgrep.sarif .

      - name: Capture OSV-Scanner evidence
        continue-on-error: true
        shell: bash
        run: osv-scanner --recursive . > reports/osv-scanner.txt

      - name: Capture SBOM evidence
        continue-on-error: true
        run: syft . -o cyclonedx-json=reports/sbom.cdx.json

      - name: Capture Grype evidence
        continue-on-error: true
        shell: bash
        run: grype . --fail-on high -o json > reports/grype.json

      - name: Capture actionlint evidence
        continue-on-error: true
        shell: bash
        run: actionlint | tee reports/actionlint.txt

      - name: Capture zizmor evidence
        continue-on-error: true
        shell: bash
        run: zizmor .github/workflows | tee reports/zizmor.txt

      - name: Capture OpenSSF Scorecard evidence
        continue-on-error: true
        shell: bash
        run: scorecard --local . --format json > reports/scorecard.json

      - name: Run production security gate
        run: node ai-project-maintainer/scripts/run-local-gate.mjs . --production --strict --release --output reports/security-report.json

      - name: Write gate summary
        if: always()
        shell: bash
        run: |
          if [ -f reports/security-report.md ]; then
            cat reports/security-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "security-report.md was not generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/security-report.sarif
        continue-on-error: true

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-evidence
          path: reports/
          if-no-files-found: ignore
