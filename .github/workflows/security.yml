name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  security:
    name: Heavy security gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm

      - name: Set up Go for scanner CLIs
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.25"

      - name: Install project dependencies
        run: npm ci

      - name: Install scanner CLIs
        shell: bash
        env:
          GITLEAKS_VERSION: v8.30.0
          TRIVY_VERSION: v0.71.2
          SEMGREP_VERSION: 1.168.0
          ZIZMOR_VERSION: 1.26.1
          OSV_SCANNER_VERSION: v2.4.0
          ACTIONLINT_VERSION: v1.7.12
          SYFT_VERSION: v1.46.0
          GRYPE_VERSION: v0.111.1
          CHECKOV_VERSION: 3.3.2
          SCORECARD_VERSION: v5.3.0
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          python -m pip install --user "semgrep==$SEMGREP_VERSION" "zizmor==$ZIZMOR_VERSION" "checkov==$CHECKOV_VERSION"
          go install "github.com/zricethezav/gitleaks/v8@$GITLEAKS_VERSION"
          go install "github.com/google/osv-scanner/v2/cmd/osv-scanner@$OSV_SCANNER_VERSION"
          go install "github.com/rhysd/actionlint/cmd/actionlint@$ACTIONLINT_VERSION"
          go install "github.com/anchore/syft/cmd/syft@$SYFT_VERSION"
          go install "github.com/anchore/grype/cmd/grype@$GRYPE_VERSION"
          go install "github.com/ossf/scorecard/v5@$SCORECARD_VERSION"
          curl -sSfL "https://raw.githubusercontent.com/aquasecurity/trivy/$TRIVY_VERSION/contrib/install.sh" -o "$RUNNER_TEMP/trivy-install.sh"
          sh "$RUNNER_TEMP/trivy-install.sh" -b "$HOME/.local/bin" "$TRIVY_VERSION"

      - name: Run tests
        run: npm test

      - name: Check script syntax
        run: npm run check

      - name: Validate package contents
        run: npm pack --dry-run

      - name: Prepare report directory
        run: mkdir -p reports

      - name: Capture Gitleaks evidence
        run: gitleaks detect --source . --redact --no-git --report-format json --report-path reports/gitleaks.json || true

      - name: Capture Trivy evidence
        run: trivy fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL --format json --output reports/trivy.json . || true

      - name: Capture Semgrep evidence
        run: semgrep scan --config auto --sarif --output reports/semgrep.sarif . || true

      - name: Capture OSV-Scanner evidence
        shell: bash
        run: osv-scanner --recursive . > reports/osv-scanner.txt || true

      - name: Capture SBOM evidence
        run: syft . -o cyclonedx-json=reports/sbom.cdx.json || true

      - name: Capture Grype evidence
        shell: bash
        run: grype . --fail-on high -o json > reports/grype.json || true

      - name: Capture actionlint evidence
        shell: bash
        run: actionlint | tee reports/actionlint.txt || true

      - name: Capture zizmor evidence
        shell: bash
        run: zizmor .github/workflows | tee reports/zizmor.txt || true

      - name: Capture OpenSSF Scorecard evidence
        shell: bash
        run: scorecard --local . --format json > reports/scorecard.json || true

      - name: Run production security gate
        run: node ai-project-maintainer/scripts/run-local-gate.mjs . --production --strict --release --output reports/security-report.json

      - name: Write gate summary
        if: always()
        shell: bash
        run: |
          if [ -f reports/security-report.md ]; then
            cat reports/security-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "security-report.md was not generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a
        with:
          sarif_file: reports/security-report.sarif
        continue-on-error: true

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-evidence
          path: reports/
          if-no-files-found: ignore
