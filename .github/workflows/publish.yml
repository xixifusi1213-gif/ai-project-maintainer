name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish or retry, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    name: Trusted npm publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check script syntax
        run: npm run check

      - name: Run packed npm CLI smoke test
        run: npm run smoke:npm

      - name: Verify real OSS cases
        run: npm run cases:verify

      - name: Prepare release directories
        run: mkdir -p dist reports

      - name: Run production release gate
        run: node ai-project-maintainer/scripts/run-local-gate.mjs . --production --agent-risk --strict --release --output reports/security-report.json

      - name: Generate npm SBOM
        run: npm sbom --sbom-format cyclonedx --json > dist/sbom.cdx.json

      - name: Pack npm tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          npm pack --pack-destination dist
          tarball="$(ls dist/ai-project-maintainer-*.tgz | head -n 1)"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Verify prepublish alignment
        run: node ai-project-maintainer/scripts/verify-release.mjs --prepublish --version "${RELEASE_TAG#v}" --tag "$RELEASE_TAG" --tarball "${{ steps.pack.outputs.tarball }}"

      - name: Generate release manifest
        run: node ai-project-maintainer/scripts/release-manifest.mjs --version "${RELEASE_TAG#v}" --tag "$RELEASE_TAG" --tarball "${{ steps.pack.outputs.tarball }}" --sbom dist/sbom.cdx.json --report reports/security-report.json --output dist/release-manifest.json

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: |
            ${{ steps.pack.outputs.tarball }}
            dist/sbom.cdx.json
            dist/release-manifest.json
            reports/security-report.json

      - name: Check npm publication status
        id: npm_status
        shell: bash
        run: |
          set -euo pipefail
          if npm view "ai-project-maintainer@${RELEASE_TAG#v}" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with trusted publishing
        if: steps.npm_status.outputs.published != 'true'
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public --provenance --registry=https://registry.npmjs.org/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          notes_file="docs/releases/${RELEASE_TAG}.md"
          title="${RELEASE_TAG}: Trusted release chain"
          assets=(
            "${{ steps.pack.outputs.tarball }}"
            "dist/sbom.cdx.json"
            "dist/release-manifest.json"
            "dist/release-manifest.md"
            "reports/security-report.json"
            "reports/security-report.md"
            "reports/security-report.sarif"
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$title" --notes-file "$notes_file"
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --title "$title" --notes-file "$notes_file" --verify-tag
          fi

      - name: Verify published release alignment
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            if node ai-project-maintainer/scripts/verify-release.mjs --published --version "${RELEASE_TAG#v}" --tag "$RELEASE_TAG" --manifest dist/release-manifest.json; then
              exit 0
            fi
            sleep 10
          done
          node ai-project-maintainer/scripts/verify-release.mjs --published --version "${RELEASE_TAG#v}" --tag "$RELEASE_TAG" --manifest dist/release-manifest.json

      - name: Upload release evidence artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-evidence-${{ env.RELEASE_TAG }}
          path: |
            dist/
            reports/
          if-no-files-found: ignore
