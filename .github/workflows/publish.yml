name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish or retry, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    name: Trusted npm publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Go for release gate scanners
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: |
          npm install -g npm@11.9.0
          node --version
          npm --version
          npm ci

      - name: Install blocking release gate scanners
        shell: bash
        env:
          GITLEAKS_VERSION: v8.30.0
          TRIVY_VERSION: v0.71.2
          SEMGREP_VERSION: 1.168.0
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          python -m pip install --user "semgrep==$SEMGREP_VERSION"
          go install "github.com/zricethezav/gitleaks/v8@$GITLEAKS_VERSION"
          curl -sSfL "https://raw.githubusercontent.com/aquasecurity/trivy/$TRIVY_VERSION/contrib/install.sh" -o "$RUNNER_TEMP/trivy-install.sh"
          sh "$RUNNER_TEMP/trivy-install.sh" -b "$HOME/.local/bin" "$TRIVY_VERSION"

      - name: Run tests
        run: npm test

      - name: Check script syntax
        run: npm run check

      - name: Run packed npm CLI smoke test
        run: npm run smoke:npm

      - name: Verify real OSS cases
        run: npm run cases:verify

      - name: Prepare release directories
        run: mkdir -p dist reports

      - name: Run production release gate
        run: node ai-project-maintainer/scripts/run-local-gate.mjs . --production --agent-risk --strict --release --output reports/security-report.json

      - name: Generate npm SBOM
        run: npm sbom --sbom-format cyclonedx --json > dist/sbom.cdx.json

      - name: Pack npm tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          npm pack --pack-destination dist
          tarball="$(find dist -maxdepth 1 -type f -name 'ai-project-maintainer-*.tgz' -print -quit)"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Verify prepublish alignment
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: node ai-project-maintainer/scripts/verify-release.mjs --prepublish --version "${RELEASE_TAG#v}" --tag "$RELEASE_TAG" --tarball "$TARBALL"

      - name: Generate release manifest
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: node ai-project-maintainer/scripts/release-manifest.mjs --version "${RELEASE_TAG#v}" --tag "$RELEASE_TAG" --commit "$(git rev-parse HEAD)" --tarball "$TARBALL" --sbom dist/sbom.cdx.json --report reports/security-report.json --output dist/release-manifest.json

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: |
            ${{ steps.pack.outputs.tarball }}
            dist/sbom.cdx.json
            dist/release-manifest.json
            reports/security-report.json

      - name: Check npm publication status
        id: npm_status
        shell: bash
        run: |
          set -euo pipefail
          if npm view "ai-project-maintainer@${RELEASE_TAG#v}" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with trusted publishing
        if: steps.npm_status.outputs.published != 'true'
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: npm publish "./$TARBALL" --access public --provenance --registry=https://registry.npmjs.org/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        shell: bash
        run: |
          set -euo pipefail
          notes_file="docs/releases/${RELEASE_TAG}.md"
          title="$(grep -m 1 '^# ' "$notes_file" | sed 's/^# //')"
          if [ -z "$title" ]; then
            title="$RELEASE_TAG"
          fi
          assets=(
            "$TARBALL"
            "dist/sbom.cdx.json"
            "dist/release-manifest.json"
            "dist/release-manifest.md"
            "reports/security-report.json"
            "reports/security-report.md"
            "reports/security-report.sarif"
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$title" --notes-file "$notes_file"
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --title "$title" --notes-file "$notes_file" --verify-tag
          fi

      - name: Verify published release alignment
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            echo "Published release verification attempt $attempt"
            if node ai-project-maintainer/scripts/verify-release.mjs --published --version "${RELEASE_TAG#v}" --tag "$RELEASE_TAG" --manifest dist/release-manifest.json; then
              exit 0
            fi
            sleep 10
          done
          node ai-project-maintainer/scripts/verify-release.mjs --published --version "${RELEASE_TAG#v}" --tag "$RELEASE_TAG" --manifest dist/release-manifest.json

      - name: Upload release evidence artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-evidence-${{ env.RELEASE_TAG }}
          path: |
            dist/
            reports/
          if-no-files-found: ignore
