name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check script syntax
        run: npm run check

      - name: Validate package contents
        run: npm pack --dry-run

      - name: Run packed npm CLI smoke test
        run: npm run smoke:npm

      - name: Probe local tool availability
        continue-on-error: true
        run: node ai-project-maintainer/scripts/doctor.mjs --no-trivy-db

      - name: Run local gate smoke test
        run: node ai-project-maintainer/scripts/ci-smoke-gate.mjs . reports/security-report.json

      - name: Upload gate reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-reports-node-${{ matrix.node-version }}
          path: reports/
          if-no-files-found: ignore
